# РһСӮСҖРёРјР°РҪРҪСҸ Р°РІСӮРҫР·Р°РІРөСҖСҲРөРҪРҪСҸ РІРІРҫРҙСғ РәРҫРјР°РҪРҙ Р· config-schema.json
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$all\
$character"""

# Р”РҫРҙР°РІР°СӮРё РҝРҫСҖРҫР¶РҪС– СҖСҸРҙРәРё РјС–Р¶ РәРҫРјР°РҪРҙРҪРёРјРё СҖСҸРҙРәР°РјРё
add_newline = false

# Р—Р°РјС–РҪСҸСӮРё СҒРёРјРІРҫР» 'вқҜ' РІ РәРҫРјР°РҪРҙРҪРҫРјСғ СҖСҸРҙРәСғ РҪР° СҒРёРјРІРҫР»  'вһң'
[character] # РқР°Р·РІР° РјРҫРҙСғР»СҸ, СҸРәРёР№ РјРё РҪР°Р»Р°СҲСӮРҫРІСғС”РјРҫ вҖ“ 'character'
success_symbol = '[вһң](#9ece6a bold)' # Р§Р°СҒСӮРёРҪР° 'success_symbol' РұСғРҙРө РІРёРәРҫСҖРёСҒСӮРҫРІСғРІР°СӮРё СҒРёРјРІРҫР» 'вһң' РҝС–РҙСҒРІС–СҮРөРҪРёР№ Р·РҪР°СҮРөРҪРҪСҸРј 'bold green'

[username]
style_user = 'blue bold'
style_root = 'white bold'
format = '[$user]($style)'
show_always = true

[hostname]
ssh_only = false
format = '[@](white bold)[$hostname](green bold)'

[directory]
style = "#04d1f9 bold"
truncation_length = 0
truncate_to_repo = false

[custom.giturl]
# disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пҗҲ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пҠ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="п…ұ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="пһЎ "
else
    GIT_REMOTE_SYMBOL="пҮ’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output"

